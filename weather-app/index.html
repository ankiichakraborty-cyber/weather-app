<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-400 to-purple-500 min-h-screen text-white">

<div class="container mx-auto p-4">

    <h1 class="text-3xl font-bold text-center mb-6">🌤 Weather Dashboard</h1>

    <!-- SEARCH -->
    <div class="flex flex-col md:flex-row gap-2 justify-center mb-4">
        <input id="cityInput" type="text" placeholder="Enter city"
            class="p-2 rounded text-black w-full md:w-1/3">

        <button onclick="getWeather()"
            class="bg-black px-4 py-2 rounded">Search</button>

        <button onclick="getLocationWeather()"
            class="bg-gray-800 px-4 py-2 rounded">Use My Location</button>
    </div>

    <!-- DROPDOWN -->
    <select id="recentCities" onchange="selectCity()"
        class="text-black p-2 rounded mb-4 hidden"></select>

    <!-- ERROR -->
    <p id="error" class="text-red-300 text-center"></p>

    <!-- CURRENT WEATHER -->
    <div id="currentWeather" class="bg-white/20 p-4 rounded mb-4"></div>

    <!-- FORECAST -->
    <div id="forecast" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>

</div>

<script src="script.js"></script>
</body>
</html>
